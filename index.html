<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="DramaBox - Nonton drama Asia terlengkap. Korea, China, Thailand, Jepang, dan banyak lagi.">
<title>DramaBox — Nonton Drama Asia</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
<link rel="stylesheet" href="styles/global.css">
</head>
<body>

<!-- INITIAL LOADER -->
<div id="init-loader" style="position:fixed;inset:0;z-index:9999;background:#080810;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.2rem">
  <div style="font-family:'Georgia',serif;font-size:2.5rem;font-weight:700;color:#e63946;animation:pulse 1.2s infinite">DramaBox</div>
  <div style="width:100px;height:2px;background:#171724;border-radius:2px;overflow:hidden">
    <div style="height:100%;background:#e63946;border-radius:2px;animation:load 1.4s ease-in-out infinite"></div>
  </div>
  <p style="font-size:0.75rem;color:#7a7a9a;font-family:sans-serif">Memuat aplikasi...</p>
</div>
<style>
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes load{0%{width:0;transform:translateX(0)}50%{width:70%}100%{width:100%;transform:translateX(100px)}}
</style>

<!-- NAVBAR -->
<nav id="navbar">
  <div class="nav-logo" onclick="window.__nav('/')">Drama<b>Box</b></div>
  <ul class="nav-links" id="navLinks">
    <li data-path="/" onclick="window.__nav('/')">Beranda</li>
    <li data-path="/recommend" onclick="window.__nav('/recommend')">Rekomendasi</li>
    <li data-path="/latest" onclick="window.__nav('/latest')">Terbaru</li>
    <li data-path="/categories" onclick="window.__nav('/categories')">Kategori</li>
    <li data-path="/vip" onclick="window.__nav('/vip')">👑 VIP</li>
    <li data-path="/search" onclick="window.__nav('/search')">Cari</li>
  </ul>
  <div class="nav-right">
    <div class="nav-search-wrap">
      <input class="nav-search" id="navSearch" type="text" placeholder="Cari drama..." autocomplete="off"
        onkeydown="if(event.key==='Enter'&&this.value.trim())window.__nav('/search',{q:encodeURIComponent(this.value.trim())})">
      <button class="nav-search-btn" onclick="const q=document.getElementById('navSearch').value.trim();if(q)window.__nav('/search',{q:encodeURIComponent(q)})">🔍</button>
    </div>
  </div>
</nav>

<!-- APP ROOT -->
<div id="app"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- BACK TO TOP -->
<button id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" style="position:fixed;bottom:2rem;right:2rem;width:40px;height:40px;border-radius:50%;background:var(--red);color:#fff;border:none;cursor:pointer;font-size:1.1rem;z-index:300;opacity:0;transition:opacity 0.3s;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(230,57,70,0.4)">↑</button>

<script type="module">
// ── IMPORTS ───────────────────────────────────────────────
import { renderHome } from './pages/home.js';
import { renderDetail } from './pages/detail.js';
import { renderSearch, renderCategories, renderCategory, renderVip, renderLatest, renderRecommend } from './pages/other.js';
import { toast as showToast } from './lib/components.js';

const app = document.getElementById('app');

// ── ROUTER ────────────────────────────────────────────────
function getPath() {
  const hash = location.hash.slice(1) || '/';
  return hash.split('?')[0] || '/';
}
function getParams() {
  const hash = location.hash.slice(1);
  const q = hash.split('?')[1] || '';
  return Object.fromEntries(new URLSearchParams(q));
}

async function dispatch() {
  const path = getPath();
  const params = getParams();

  // Show loader
  app.innerHTML = `<div id="page-loader"><div class="spin"></div><p style="font-size:0.8rem">Memuat...</p></div>`;

  // Update nav active
  document.querySelectorAll('.nav-links li').forEach(li => {
    li.classList.toggle('active', li.dataset.path === path);
  });

  // Navbar solid on non-home
  document.getElementById('navbar').classList.toggle('solid', path !== '/');

  try {
    switch (path) {
      case '/':
      case '':         await renderHome(app); break;
      case '/detail':  await renderDetail(app, params); break;
      case '/search':  await renderSearch(app, params); break;
      case '/categories': await renderCategories(app); break;
      case '/category':   await renderCategory(app, params); break;
      case '/vip':     await renderVip(app); break;
      case '/latest':  await renderLatest(app); break;
      case '/recommend': await renderRecommend(app); break;
      default:
        app.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:center;min-height:80vh;flex-direction:column;gap:1rem">
            <div style="font-size:4rem">🎬</div>
            <h2 style="font-family:'Georgia',serif;font-size:2rem">Halaman Tidak Ditemukan</h2>
            <button class="btn btn-red" onclick="window.__nav('/')">← Kembali ke Beranda</button>
          </div>`;
    }
  } catch (err) {
    console.error(err);
    app.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;min-height:80vh;flex-direction:column;gap:1rem">
        <div style="font-size:3rem">⚠️</div>
        <h2 style="font-family:'Georgia',serif">Terjadi Kesalahan</h2>
        <p style="color:var(--muted);font-size:0.85rem">${err.message}</p>
        <button class="btn btn-red" onclick="window.__nav('/')">← Kembali</button>
      </div>`;
  }
}

// ── NAVIGATION ────────────────────────────────────────────
window.__nav = function(path, params = {}) {
  const q = new URLSearchParams(params).toString();
  location.hash = q ? `${path}?${q}` : path;
};

window.__toast = showToast;

// ── EVENTS ────────────────────────────────────────────────
window.addEventListener('hashchange', dispatch);

// Navbar scroll
window.addEventListener('scroll', () => {
  const solid = scrollY > 30 || getPath() !== '/';
  document.getElementById('navbar').classList.toggle('solid', solid);
  const backTop = document.getElementById('backTop');
  backTop.style.opacity = scrollY > 400 ? '1' : '0';
}, { passive: true });

// ── INIT ──────────────────────────────────────────────────
// Hide initial loader
setTimeout(() => {
  const loader = document.getElementById('init-loader');
  if (loader) { loader.style.opacity = '0'; loader.style.transition = 'opacity 0.5s'; setTimeout(() => loader.remove(), 500); }
}, 300);

dispatch();
</script>
</body>
</html>
