<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kuhaku Drama</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<style>
:root{
  --red:#e8003d; --red2:#ff2255;
  --bg:#0a0a0f; --bg2:#111118; --bg3:#1a1a24;
  --card:#141420; --border:#252535;
  --text:#f0f0f8; --muted:#666680; --gold:#ffcc44;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{height:4px;width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--red);border-radius:2px;}
a{text-decoration:none;color:inherit;}

/* ── NAV ── */
#topNav{
  position:fixed;top:0;left:0;right:0;z-index:800;
  height:56px;display:flex;align-items:center;
  padding:0 20px;gap:16px;
  background:rgba(10,10,15,0.97);
  border-bottom:1px solid rgba(232,0,61,0.12);
  backdrop-filter:blur(20px);
}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;cursor:pointer;flex-shrink:0;}
.logo span{color:var(--red);}
.nav-search{
  flex:1;position:relative;display:flex;align-items:center;max-width:340px;
}
.nav-search input{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  color:var(--text);font-family:'Noto Sans',sans-serif;font-size:13px;
  padding:7px 36px 7px 14px;border-radius:20px;outline:none;transition:.25s;
}
.nav-search input:focus{border-color:var(--red);}
.nav-search input::placeholder{color:var(--muted);}
.nav-search button{position:absolute;right:11px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;}
.nav-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.nav-icon-btn{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text);font-size:12px;font-weight:600;
  padding:6px 12px;border-radius:16px;cursor:pointer;
  display:flex;align-items:center;gap:5px;transition:.2s;
  font-family:'Noto Sans',sans-serif;white-space:nowrap;
}
.nav-icon-btn:hover{border-color:var(--red);}
.nav-badge{background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;min-width:15px;text-align:center;}

/* ── BOTTOM NAV (mobile) ── */
#bottomNav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;z-index:800;
  height:56px;
  background:rgba(10,10,15,0.98);
  border-top:1px solid var(--border);
  backdrop-filter:blur(20px);
  justify-content:space-around;align-items:center;
}
.bnav-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-family:'Noto Sans',sans-serif;font-size:10px;font-weight:500;
  padding:6px 16px;border-radius:8px;transition:.2s;
}
.bnav-btn .icon{font-size:18px;}
.bnav-btn.active,.bnav-btn:hover{color:var(--red);}
@media(max-width:640px){
  #bottomNav{display:flex;}
  body{padding-bottom:56px;}
  .nav-right{display:none;}
}

/* ── HERO BANNER ── */
#heroBanner{
  position:relative;width:100%;
  height:calc(100vw * 0.56);max-height:480px;min-height:220px;
  margin-top:56px;overflow:hidden;cursor:pointer;
}
#heroBg{
  position:absolute;inset:0;
  background-size:cover;background-position:center 15%;
  transition:opacity .6s;
}
#heroBg::after{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(0deg,rgba(10,10,15,1) 0%,rgba(10,10,15,.3) 35%,transparent 65%),
    linear-gradient(90deg,rgba(10,10,15,.7) 0%,transparent 50%);
}
.hero-info{
  position:absolute;bottom:0;left:0;right:0;
  padding:16px 20px 20px;z-index:2;
}
.hero-title-wrap{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(22px,5vw,38px);letter-spacing:1.5px;line-height:1;max-width:70%;}
.hero-play-btn{
  flex-shrink:0;background:var(--red);color:#fff;border:none;
  padding:9px 18px;border-radius:5px;font-family:'Noto Sans',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:.15s;
  box-shadow:0 4px 16px rgba(232,0,61,.4);
}
.hero-play-btn:hover{background:var(--red2);}
.hero-meta-row{display:flex;gap:10px;align-items:center;margin-top:6px;flex-wrap:wrap;}
.hero-score{color:var(--gold);font-size:12px;font-weight:700;}
.hero-tag{background:rgba(255,255,255,.1);color:#ccc;font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid rgba(255,255,255,.12);}
.hero-dots{
  position:absolute;bottom:6px;right:20px;z-index:3;
  display:flex;gap:5px;align-items:center;
}
.hero-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:.2s;}
.hero-dot.active{background:var(--red);width:18px;border-radius:3px;}

/* ── ROW SECTION ── */
.row-section{padding:18px 0 4px;}
.row-header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;margin-bottom:12px;}
.row-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1.5px;display:flex;align-items:center;gap:8px;}
.row-title::before{content:'';display:block;width:3px;height:16px;background:var(--red);border-radius:1px;}
.row-more{color:var(--muted);font-size:11px;font-weight:600;background:none;border:none;cursor:pointer;letter-spacing:.5px;transition:.2s;font-family:'Noto Sans',sans-serif;}
.row-more:hover{color:var(--red);}
.row-scroll{
  display:flex;gap:10px;overflow-x:auto;padding:0 16px 10px;
  scroll-snap-type:x mandatory;scrollbar-width:none;
}
.row-scroll::-webkit-scrollbar{display:none;}

/* ── DRAMA CARD ── */
.drama-card{
  flex-shrink:0;width:110px;cursor:pointer;
  scroll-snap-align:start;
  transition:transform .2s;
  position:relative;
}
.drama-card:hover{transform:scale(1.04);}
.card-poster{
  width:110px;height:154px;border-radius:8px;overflow:hidden;
  background:var(--card);position:relative;
  border:1px solid transparent;transition:.2s;
}
.drama-card:hover .card-poster{border-color:var(--red);}
.card-poster img{width:100%;height:100%;object-fit:cover;display:block;}
.card-poster-overlay{
  position:absolute;inset:0;
  background:linear-gradient(0deg,rgba(10,10,15,.9) 0%,transparent 50%);
  opacity:0;transition:.2s;display:flex;align-items:center;justify-content:center;
}
.drama-card:hover .card-poster-overlay{opacity:1;}
.card-play-icon{
  width:38px;height:38px;border-radius:50%;
  background:rgba(232,0,61,.9);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:16px;
}
.card-wl-icon{
  position:absolute;top:5px;right:5px;
  width:24px;height:24px;border-radius:50%;
  background:rgba(10,10,15,.75);border:1px solid rgba(255,255,255,.2);
  color:#fff;font-size:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:.2s;z-index:2;
}
.drama-card:hover .card-wl-icon{opacity:1;}
.card-wl-icon:hover{background:var(--red);border-color:var(--red);}
.card-wl-icon.saved{background:rgba(255,204,68,.12);border-color:var(--gold);color:var(--gold);opacity:1;}
.card-score-badge{
  position:absolute;bottom:5px;left:5px;
  background:rgba(0,0,0,.75);color:var(--gold);
  font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;
}
.card-info{margin-top:6px;}
.card-title{font-size:12px;font-weight:500;line-height:1.3;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-year{font-size:10px;color:var(--muted);margin-top:2px;}

/* SKELETON */
.card-skeleton{flex-shrink:0;width:110px;scroll-snap-align:start;}
.skeleton-poster{width:110px;height:154px;border-radius:8px;background:var(--card);animation:pulse 1.4s ease-in-out infinite;}
.skeleton-line{height:10px;border-radius:4px;background:var(--card);margin-top:7px;animation:pulse 1.4s ease-in-out infinite;}
.skeleton-line.short{width:60%;}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.65}}

/* ── GENRE CHIPS ── */
.genre-chips{display:flex;gap:7px;overflow-x:auto;padding:0 16px 2px;scrollbar-width:none;margin-top:12px;}
.genre-chips::-webkit-scrollbar{display:none;}
.g-chip{
  flex-shrink:0;background:var(--bg3);border:1px solid var(--border);
  color:var(--muted);font-size:11px;font-weight:600;
  padding:5px 13px;border-radius:16px;cursor:pointer;transition:.18s;
  font-family:'Noto Sans',sans-serif;white-space:nowrap;
}
.g-chip:hover{border-color:var(--red);color:var(--text);}
.g-chip.active{background:var(--red);border-color:var(--red);color:#fff;}

/* ── PAGES ── */
#mainPage{padding-bottom:20px;}
#searchPage{display:none;padding:16px;}
#watchlistPage{display:none;padding:16px;}
#categoryPage{display:none;padding:16px;}
.page-heading{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.page-heading::before{content:'';display:block;width:3px;height:18px;background:var(--red);border-radius:1px;}
.search-label{color:var(--muted);font-size:12px;margin-bottom:12px;}
.search-label span{color:var(--text);font-weight:600;}
.grid-page{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:14px;}

/* ── DETAIL MODAL ── */
#detailModal{
  position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,.88);backdrop-filter:blur(10px);
  display:none;align-items:flex-end;justify-content:center;
  padding-top:56px;
}
#detailModal.open{display:flex;}
.detail-sheet{
  background:var(--bg2);border-radius:16px 16px 0 0;
  width:100%;max-width:520px;max-height:90vh;overflow-y:auto;
  border-top:1px solid var(--border);
  animation:slideUp .28s ease;
}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.detail-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.detail-backdrop{
  width:100%;height:180px;position:relative;overflow:hidden;flex-shrink:0;
}
.detail-backdrop img{width:100%;height:100%;object-fit:cover;filter:brightness(.5);}
.detail-backdrop::after{content:'';position:absolute;inset:0;background:linear-gradient(0deg,var(--bg2) 0%,transparent 60%);}
.detail-close{
  position:absolute;top:10px;right:10px;z-index:2;
  background:rgba(0,0,0,.6);border:none;color:#fff;
  width:30px;height:30px;border-radius:50%;font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.detail-body{padding:0 16px 24px;}
.detail-top{display:flex;gap:14px;margin-top:-50px;position:relative;z-index:2;margin-bottom:12px;}
.detail-poster{width:90px;min-width:90px;height:126px;border-radius:8px;overflow:hidden;border:2px solid var(--bg2);flex-shrink:0;}
.detail-poster img{width:100%;height:100%;object-fit:cover;}
.detail-right{padding-top:52px;}
.detail-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;line-height:1.1;margin-bottom:6px;}
.detail-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
.detail-score{color:var(--gold);font-size:12px;font-weight:700;}
.detail-sub{color:var(--muted);font-size:11px;}
.detail-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.detail-tag{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#bbb;font-size:10px;padding:2px 8px;border-radius:8px;}
.detail-overview{color:#aaa;font-size:12px;line-height:1.7;margin-bottom:16px;}
.detail-actions{display:flex;gap:8px;}
.detail-play-btn{
  flex:1;background:var(--red);color:#fff;border:none;
  padding:11px;border-radius:8px;font-family:'Noto Sans',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;transition:.15s;
}
.detail-play-btn:hover{background:var(--red2);}
.detail-wl-btn{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text);padding:11px 14px;border-radius:8px;cursor:pointer;
  font-size:18px;transition:.2s;
}
.detail-wl-btn:hover,.detail-wl-btn.saved{border-color:var(--gold);color:var(--gold);}

/* ── PLAYER MODAL ── */
#playerModal{
  position:fixed;inset:0;z-index:1100;
  background:#000;
  display:none;flex-direction:column;
}
#playerModal.open{display:flex;}
.player-top{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;background:rgba(0,0,0,.95);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.player-back{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px;}
.player-top-title{font-size:14px;font-weight:600;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.player-video-area{
  width:100%;background:#000;position:relative;
  aspect-ratio:16/9;flex-shrink:0;
}
#videoPlayer{width:100%;height:100%;display:none;background:#000;}
#iframePlayer{width:100%;height:100%;display:none;border:none;}
.player-loading{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:#000;flex-direction:column;gap:10px;
}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.player-body{flex:1;overflow-y:auto;padding:14px;}
.player-drama-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;margin-bottom:4px;}
.player-ep-label{color:var(--muted);font-size:12px;margin-bottom:12px;}
.eps-wrap{display:flex;gap:7px;flex-wrap:wrap;}
.ep-btn{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--muted);font-size:12px;font-weight:600;
  padding:7px 12px;border-radius:6px;cursor:pointer;transition:.18s;
  font-family:'Noto Sans',sans-serif;min-width:48px;text-align:center;
}
.ep-btn:hover{border-color:var(--red);color:var(--text);}
.ep-btn.active{background:var(--red);border-color:var(--red);color:#fff;}

/* TOAST */
#toast{
  position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text);font-size:12px;padding:9px 18px;border-radius:8px;
  z-index:9999;opacity:0;transition:.25s;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4;}
</style>
</head>
<body>

<!-- TOP NAV -->
<nav id="topNav">
  <div class="logo" onclick="goHome()">KUHAKU <span>DRAMA</span></div>
  <div class="nav-search">
    <input type="text" id="searchInput" placeholder="Cari drama..." onkeydown="if(event.key==='Enter')doSearch()">
    <button onclick="doSearch()">🔍</button>
  </div>
  <div class="nav-right">
    <button class="nav-icon-btn" onclick="goWatchlist()">♥ Watchlist <span class="nav-badge" id="wlCount">0</span></button>
  </div>
</nav>

<!-- BOTTOM NAV -->
<div id="bottomNav">
  <button class="bnav-btn active" id="bnav-home" onclick="goHome()"><span class="icon">🏠</span>Beranda</button>
  <button class="bnav-btn" id="bnav-search" onclick="focusSearch()"><span class="icon">🔍</span>Cari</button>
  <button class="bnav-btn" id="bnav-wl" onclick="goWatchlist()"><span class="icon">♥</span>Watchlist</button>
</div>

<!-- MAIN PAGE -->
<div id="mainPage">
  <!-- HERO -->
  <div id="heroBanner" onclick="heroBannerClick()">
    <div id="heroBg"></div>
    <div class="hero-info">
      <div class="hero-title-wrap">
        <div class="hero-title" id="heroTitle">Memuat...</div>
        <button class="hero-play-btn">▶ Tonton</button>
      </div>
      <div class="hero-meta-row">
        <span class="hero-score" id="heroScore"></span>
        <span class="hero-tag" id="heroYear"></span>
        <span class="hero-tag" id="heroEps"></span>
      </div>
    </div>
    <div class="hero-dots" id="heroDots"></div>
  </div>

  <!-- GENRE CHIPS -->
  <div class="genre-chips" id="genreChips"></div>

  <!-- DYNAMIC SECTIONS -->
  <div id="dynamicSections"></div>
</div>

<!-- SEARCH PAGE -->
<div id="searchPage">
  <div class="search-label">Hasil pencarian: <span id="searchLabel"></span></div>
  <div class="grid-page" id="searchGrid"></div>
</div>

<!-- WATCHLIST PAGE -->
<div id="watchlistPage">
  <div class="page-heading">Watchlist</div>
  <div class="grid-page" id="wlGrid"></div>
  <div class="empty-state" id="wlEmpty" style="display:none">
    <div class="empty-icon">♡</div>
    <div>Belum ada drama tersimpan.</div>
  </div>
</div>

<!-- CATEGORY PAGE -->
<div id="categoryPage">
  <div class="page-heading" id="catPageTitle">Drama</div>
  <div class="grid-page" id="catGrid"></div>
</div>

<!-- DETAIL MODAL (bottom sheet) -->
<div id="detailModal">
  <div class="detail-sheet">
    <div class="detail-handle"></div>
    <div class="detail-backdrop">
      <img id="detailBdImg" src="" alt="">
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body">
      <div class="detail-top">
        <div class="detail-poster"><img id="detailPosterImg" src="" alt=""></div>
        <div class="detail-right">
          <div class="detail-title" id="detailTitle"></div>
          <div class="detail-meta">
            <span class="detail-score" id="detailScore"></span>
            <span class="detail-sub" id="detailYear"></span>
            <span class="detail-sub" id="detailEps"></span>
          </div>
        </div>
      </div>
      <div class="detail-tags" id="detailTags"></div>
      <div class="detail-overview" id="detailOverview"></div>
      <div class="detail-actions">
        <button class="detail-play-btn" id="detailPlayBtn">▶ Tonton Sekarang</button>
        <button class="detail-wl-btn" id="detailWlBtn">♡</button>
      </div>
    </div>
  </div>
</div>

<!-- PLAYER MODAL -->
<div id="playerModal">
  <div class="player-top">
    <button class="player-back" onclick="closePlayer()">←</button>
    <div class="player-top-title" id="playerTopTitle"></div>
  </div>
  <div class="player-video-area">
    <div class="player-loading" id="playerLoading">
      <div class="spinner"></div>
      <span style="color:var(--muted);font-size:13px">Memuat...</span>
    </div>
    <video id="videoPlayer" controls playsinline></video>
    <iframe id="iframePlayer" allowfullscreen allow="autoplay"></iframe>
  </div>
  <div class="player-body">
    <div class="player-drama-title" id="playerTitle"></div>
    <div class="player-ep-label" id="playerEpLabel">Pilih Episode</div>
    <div class="eps-wrap" id="epsWrap"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = 'https://api.dramaku.biz.id';
let watchlist = JSON.parse(localStorage.getItem('kuhaku_wl2')||'[]');
let heroList = [];
let heroIdx = 0;
let heroTimer = null;
let currentChapters = [];
let currentBookId = null;
let currentDetailId = null;

// ── UTILS ──
function saveWL(){ localStorage.setItem('kuhaku_wl2', JSON.stringify(watchlist)); updateWLCount(); }
function updateWLCount(){ document.getElementById('wlCount').textContent = watchlist.length; }
function isInWL(id){ return watchlist.some(d=>String(d._id)===String(id)); }
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
function skeletonCards(n){
  return Array(n).fill(0).map(()=>`
    <div class="card-skeleton">
      <div class="skeleton-poster"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line short"></div>
    </div>`).join('');
}
function posterUrl(u){ return (u&&u.startsWith('http')) ? u : 'https://placehold.co/110x154/141420/333?text='; }

function gf(d,...keys){
  for(const k of keys){
    if(d[k]!==undefined&&d[k]!==null&&d[k]!=='') return d[k];
  }
  return '';
}
function extractUrl(obj){
  if(!obj) return '';
  if(typeof obj==='string'&&obj.startsWith('http')) return obj;
  const keys=['videoPath','video_path','url','stream_url','video_url','play_url','m3u8_url','mp4_url','src','source','link'];
  for(const k of keys) if(obj[k]&&typeof obj[k]==='string'&&obj[k].startsWith('http')) return obj[k];
  if(obj.data&&typeof obj.data==='object') return extractUrl(obj.data);
  if(obj.result&&typeof obj.result==='object') return extractUrl(obj.result);
  return '';
}
function normalizeList(data){
  const raw = data?.data ?? data?.result ?? data ?? [];
  return Array.isArray(raw) ? raw : Object.values(raw);
}
function getItemId(d){ return String(gf(d,'book_id','bookId','id','drama_id','dramaId')||''); }
function getItemTitle(d){ return gf(d,'book_name','bookName','name','title','drama_name','dramaName')||'Tanpa Judul'; }
function getItemThumb(d){ return posterUrl(gf(d,'thumb_url','thumbUrl','cover','poster','image','img','thumbnail','pic','thumb')); }
function getItemScore(d){ const s=gf(d,'score','rating','rate'); return s?parseFloat(s).toFixed(1):''; }
function getItemYear(d){ const y=gf(d,'year','release_year','releaseYear','release_time','pub_time'); return y?String(y).slice(0,4):''; }

// ── RENDER CARD (row) ──
function renderRowCard(d){
  const id=getItemId(d), title=getItemTitle(d), thumb=getItemThumb(d);
  const score=getItemScore(d), year=getItemYear(d), saved=isInWL(id);
  if(!id) return '';
  return `<div class="drama-card" onclick="openDetail('${id}')">
    <div class="card-poster">
      <img src="${thumb}" alt="${title}" loading="lazy" onerror="this.src='https://placehold.co/110x154/141420/333?text=N'">
      <div class="card-poster-overlay"><div class="card-play-icon">▶</div></div>
      ${score?`<div class="card-score-badge">⭐${score}</div>`:''}
      <button class="card-wl-icon ${saved?'saved':''}" onclick="event.stopPropagation();quickWL('${id}',this)">${saved?'♥':'♡'}</button>
    </div>
    <div class="card-info">
      <div class="card-title">${title}</div>
      ${year?`<div class="card-year">${year}</div>`:''}
    </div>
  </div>`;
}

// ── RENDER GRID CARD (page) ──
function renderGridCard(d){
  const id=getItemId(d), title=getItemTitle(d), thumb=getItemThumb(d);
  const score=getItemScore(d), year=getItemYear(d), saved=isInWL(id);
  if(!id) return '';
  return `<div class="drama-card" onclick="openDetail('${id}')">
    <div class="card-poster">
      <img src="${thumb}" alt="${title}" loading="lazy" onerror="this.src='https://placehold.co/110x154/141420/333?text=N'">
      <div class="card-poster-overlay"><div class="card-play-icon">▶</div></div>
      ${score?`<div class="card-score-badge">⭐${score}</div>`:''}
      <button class="card-wl-icon ${saved?'saved':''}" onclick="event.stopPropagation();quickWL('${id}',this)">${saved?'♥':'♡'}</button>
    </div>
    <div class="card-info">
      <div class="card-title">${title}</div>
      ${year?`<div class="card-year">${year}</div>`:''}
    </div>
  </div>`;
}

// ── WATCHLIST ──
function quickWL(id, btn){
  const card=btn.closest('.drama-card');
  const title=card.querySelector('.card-title')?.textContent||'';
  const thumb=card.querySelector('img')?.src||'';
  const idx=watchlist.findIndex(d=>String(d._id)===String(id));
  if(idx>-1){ watchlist.splice(idx,1); toast('Dihapus dari watchlist'); }
  else { watchlist.push({_id:id,book_name:title,thumb_url:thumb}); toast('✓ Ditambah ke watchlist'); }
  saveWL();
  const saved=isInWL(id);
  btn.className='card-wl-icon'+(saved?' saved':'');
  btn.textContent=saved?'♥':'♡';
}
function toggleWLById(id, title, thumb){
  const idx=watchlist.findIndex(d=>String(d._id)===String(id));
  if(idx>-1){ watchlist.splice(idx,1); toast('Dihapus dari watchlist'); }
  else { watchlist.push({_id:id,book_name:title,thumb_url:thumb}); toast('✓ Ditambah ke watchlist'); }
  saveWL();
}

// ── HERO ──
function setHeroItem(d){
  const title=getItemTitle(d), thumb=getItemThumb(d);
  const score=getItemScore(d), year=getItemYear(d);
  const eps=gf(d,'chapter_count','chapterCount','total_episodes','totalEpisodes');
  document.getElementById('heroBg').style.backgroundImage=`url('${thumb}')`;
  document.getElementById('heroTitle').textContent=title;
  document.getElementById('heroScore').textContent=score?'⭐ '+score:'';
  document.getElementById('heroYear').textContent=year||'';
  document.getElementById('heroEps').textContent=eps?eps+' Ep':'';
}
function startHeroRotation(list){
  heroList=list.slice(0,5);
  heroIdx=0;
  setHeroItem(heroList[0]);
  // Dots
  const dots=document.getElementById('heroDots');
  dots.innerHTML=heroList.map((_,i)=>`<div class="hero-dot ${i===0?'active':''}" onclick="event.stopPropagation();setHeroIdx(${i})"></div>`).join('');
  clearInterval(heroTimer);
  heroTimer=setInterval(()=>setHeroIdx((heroIdx+1)%heroList.length),4000);
}
function setHeroIdx(i){
  heroIdx=i;
  setHeroItem(heroList[i]);
  document.querySelectorAll('.hero-dot').forEach((d,j)=>d.classList.toggle('active',j===i));
}
function heroBannerClick(){ if(heroList[heroIdx]) openDetail(getItemId(heroList[heroIdx])); }

// ── LOAD HOME ──
async function loadHome(){
  // Parallel fetch semua endpoint
  const ds=document.getElementById('dynamicSections');
  ds.innerHTML='';

  const [homeRes,recomRes,vipRes,catsRes]=await Promise.allSettled([
    fetch(`${API}/api/home`).then(r=>r.json()),
    fetch(`${API}/api/recommend`).then(r=>r.json()),
    fetch(`${API}/api/vip`).then(r=>r.json()),
    fetch(`${API}/api/categories`).then(r=>r.json()),
  ]);

  const homeList = homeRes.status==='fulfilled' ? normalizeList(homeRes.value) : [];
  const recomList = recomRes.status==='fulfilled' ? normalizeList(recomRes.value) : [];
  const vipList = vipRes.status==='fulfilled' ? normalizeList(vipRes.value) : [];
  const catList = catsRes.status==='fulfilled' ? normalizeList(catsRes.value) : [];

  if(homeList.length) startHeroRotation(homeList);

  buildRow(ds,'Drama Terbaru', homeList, null);
  buildRow(ds,'Rekomendasi', recomList, null);
  buildRow(ds,'VIP / Theater', vipList, null);

  // Build genre chips
  buildGenreChips(catList);

  // Load 5 kategori pertama
  const topCats=catList.slice(0,5);
  const catResults=await Promise.allSettled(
    topCats.map(c=>fetch(`${API}/api/category/${c.id||c.category_id}`).then(r=>r.json()))
  );
  catResults.forEach((res,i)=>{
    if(res.status!=='fulfilled') return;
    const cat=topCats[i];
    const name=gf(cat,'name','category_name');
    const list=normalizeList(res.value);
    if(!list.length) return;
    buildRow(ds, name, list, cat.id||cat.category_id);
  });
}

function buildRow(container, title, list, catId){
  const sec=document.createElement('div');
  sec.className='row-section';
  const moreBtn=catId?`<button class="row-more" onclick="goCategory('${catId}','${title}')">Lihat Semua →</button>`:'';
  sec.innerHTML=`
    <div class="row-header">
      <div class="row-title">${title}</div>
      ${moreBtn}
    </div>
    <div class="row-scroll">
      ${list.length ? list.slice(0,20).map(renderRowCard).join('') : skeletonCards(6)}
    </div>`;
  container.appendChild(sec);
}

function buildGenreChips(cats){
  const bar=document.getElementById('genreChips');
  bar.innerHTML='';
  cats.slice(0,15).forEach(cat=>{
    const id=cat.id||cat.category_id;
    const name=gf(cat,'name','category_name');
    const chip=document.createElement('button');
    chip.className='g-chip';
    chip.textContent=name;
    chip.onclick=()=>{ goCategory(id,name); };
    bar.appendChild(chip);
  });
}

// ── CATEGORY PAGE ──
async function goCategory(id, name){
  showPage('categoryPage');
  document.getElementById('catPageTitle').textContent=name;
  document.getElementById('catGrid').innerHTML=`<div style="grid-column:1/-1">${skeletonCards(8).replace(/card-skeleton/g,'card-skeleton').replace(/row-scroll/g,'')}</div>`;
  try{
    const r=await fetch(`${API}/api/category/${id}`);
    const data=await r.json();
    const list=normalizeList(data);
    document.getElementById('catGrid').innerHTML=list.length?list.map(renderGridCard).join(''):'<p style="color:var(--muted);font-size:13px">Tidak ada drama.</p>';
  }catch(e){
    document.getElementById('catGrid').innerHTML='<p style="color:var(--muted);font-size:13px">Gagal memuat.</p>';
  }
}

// ── SEARCH ──
function focusSearch(){ document.getElementById('searchInput').focus(); }
async function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q) return;
  showPage('searchPage');
  setBottomNav('bnav-search');
  document.getElementById('searchLabel').textContent='"'+q+'"';
  document.getElementById('searchGrid').innerHTML='<p style="color:var(--muted);font-size:13px">Mencari...</p>';
  try{
    const r=await fetch(`${API}/api/search?keyword=${encodeURIComponent(q)}`);
    const data=await r.json();
    const list=normalizeList(data);
    document.getElementById('searchGrid').innerHTML=list.length?list.map(renderGridCard).join(''):'<p style="color:var(--muted);font-size:13px">Tidak ditemukan.</p>';
  }catch(e){
    document.getElementById('searchGrid').innerHTML='<p style="color:var(--muted);font-size:13px">Gagal mencari.</p>';
  }
}

// ── DETAIL ──
async function openDetail(bookId){
  currentDetailId=bookId;
  document.getElementById('detailModal').classList.add('open');
  document.getElementById('detailTitle').textContent='Memuat...';
  document.getElementById('detailOverview').textContent='';
  document.getElementById('detailTags').innerHTML='';
  ['detailScore','detailYear','detailEps'].forEach(id=>document.getElementById(id).textContent='');

  try{
    const r=await fetch(`${API}/api/detail/${bookId}/v2`);
    const data=await r.json();
    const d=data.data??data.result??data;
    const id=getItemId(d)||bookId;
    const title=getItemTitle(d);
    const thumb=getItemThumb(d);
    const score=getItemScore(d);
    const year=getItemYear(d);
    const eps=gf(d,'chapter_count','chapterCount','total_episodes','totalEpisodes');
    const overview=gf(d,'introduction','overview','description','synopsis','intro');
    const tags=String(gf(d,'tags','genres','category_names','categoryNames','categories')||'').split(',').filter(Boolean);

    document.getElementById('detailBdImg').src=thumb;
    document.getElementById('detailPosterImg').src=thumb;
    document.getElementById('detailTitle').textContent=title;
    document.getElementById('detailScore').textContent=score?'⭐ '+score:'';
    document.getElementById('detailYear').textContent=year;
    document.getElementById('detailEps').textContent=eps?eps+' Episode':'';
    document.getElementById('detailOverview').textContent=overview||'Tidak ada sinopsis.';
    document.getElementById('detailTags').innerHTML=tags.slice(0,5).map(t=>`<span class="detail-tag">${t.trim()}</span>`).join('');

    const saved=isInWL(id);
    const wlBtn=document.getElementById('detailWlBtn');
    wlBtn.className='detail-wl-btn'+(saved?' saved':'');
    wlBtn.textContent=saved?'♥':'♡';
    wlBtn.onclick=()=>{
      toggleWLById(id,title,thumb);
      const s=isInWL(id);
      wlBtn.className='detail-wl-btn'+(s?' saved':'');
      wlBtn.textContent=s?'♥':'♡';
    };
    document.getElementById('detailPlayBtn').onclick=()=>{ closeDetail(); openPlayer(id,title); };
  }catch(e){
    document.getElementById('detailTitle').textContent='Gagal memuat.';
  }
}
function closeDetail(){ document.getElementById('detailModal').classList.remove('open'); }

// ── PLAYER ──
async function openPlayer(bookId, title){
  currentBookId=bookId;
  currentChapters=[];
  document.getElementById('playerModal').classList.add('open');
  document.getElementById('playerTopTitle').textContent=title||'';
  document.getElementById('playerTitle').textContent=title||'';
  document.getElementById('playerEpLabel').textContent='Memuat episode...';
  document.getElementById('epsWrap').innerHTML='';
  resetVideo();

  try{
    let list=[];
    // Coba /download dulu (ada videoPath langsung)
    try{
      const r=await fetch(`${API}/download/${bookId}`);
      const d=await r.json();
      list=normalizeList(d);
    }catch(e2){}
    if(!list.length){
      const r=await fetch(`${API}/api/chapters/${bookId}`);
      const d=await r.json();
      list=normalizeList(d);
    }
    currentChapters=list;
    document.getElementById('playerEpLabel').textContent=list.length+' Episode tersedia';
    document.getElementById('epsWrap').innerHTML=list.map((ch,i)=>`
      <button class="ep-btn ${i===0?'active':''}" onclick="playEp(${i},this)">
        Ep ${ch.chapter_num||ch.ep_num||(ch.chapterIndex!=null?ch.chapterIndex+1:i+1)}
      </button>`).join('');
    if(list.length) playEp(0, document.querySelector('.ep-btn'));
  }catch(e){
    document.getElementById('playerEpLabel').textContent='Gagal memuat episode.';
    document.getElementById('playerLoading').style.display='none';
  }
}

function resetVideo(){
  const vid=document.getElementById('videoPlayer');
  const ifr=document.getElementById('iframePlayer');
  vid.style.display='none'; vid.src='';
  ifr.style.display='none'; ifr.src='';
  const pl=document.getElementById('playerLoading');
  pl.style.display='flex';
  pl.innerHTML='<div class="spinner"></div><span style="color:var(--muted);font-size:13px">Memuat video...</span>';
  if(window._hls){ window._hls.destroy(); window._hls=null; }
}

function playStream(url, debugInfo){
  const pl=document.getElementById('playerLoading');
  const vid=document.getElementById('videoPlayer');
  const ifr=document.getElementById('iframePlayer');
  pl.style.display='none'; vid.style.display='none'; ifr.style.display='none';

  if(!url){
    pl.style.display='flex';
    pl.innerHTML=`<div style="text-align:center;padding:20px;max-width:400px">
      <div style="font-size:28px;margin-bottom:8px">😔</div>
      <div style="color:#fff;font-size:13px;font-weight:600;margin-bottom:4px">Stream tidak tersedia</div>
      <div style="color:var(--muted);font-size:11px;margin-bottom:12px">Episode ini belum tersedia atau dikunci.</div>
      ${debugInfo?`<details style="text-align:left;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px">
        <summary style="color:var(--muted);font-size:10px;cursor:pointer">🔍 Debug response</summary>
        <pre style="color:#7aff7a;font-size:9px;margin-top:6px;overflow:auto;max-height:150px;white-space:pre-wrap;word-break:break-all">${JSON.stringify(debugInfo,null,2)}</pre>
      </details>`:''}
    </div>`;
    return;
  }

  if(url.includes('.m3u8')){
    if(window.Hls&&Hls.isSupported()){
      if(window._hls) window._hls.destroy();
      window._hls=new Hls({enableWorker:false});
      window._hls.loadSource(url);
      window._hls.attachMedia(vid);
      window._hls.on(Hls.Events.MANIFEST_PARSED,()=>vid.play().catch(()=>{}));
    } else if(vid.canPlayType('application/vnd.apple.mpegurl')){
      vid.src=url; vid.play().catch(()=>{});
    } else { ifr.src=url; ifr.style.display='block'; return; }
    vid.style.display='block';
  } else if(url.match(/\.(mp4|webm|ogg)(\?|$)/i)){
    vid.src=url; vid.style.display='block'; vid.play().catch(()=>{});
  } else {
    ifr.src=url; ifr.style.display='block';
  }
}

async function playEp(idx, btn){
  document.querySelectorAll('.ep-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const ch=currentChapters[idx];
  if(!ch) return;
  resetVideo();

  const direct=extractUrl(ch);
  if(direct){ playStream(direct); return; }

  const bookId=currentBookId;
  const chapterId=ch.chapter_id||ch.chapterId||ch.id;
  const epNum=ch.chapter_num||ch.ep_num||(ch.chapterIndex!=null?ch.chapterIndex+1:idx+1);
  let found='', lastResp=null;

  const endpoints=[
    `${API}/api/stream?bookId=${bookId}&episode=${epNum}`,
    `${API}/api/stream?bookId=${bookId}&chapterId=${chapterId}`,
    `${API}/api/stream?bookId=${bookId}&ep=${epNum}`,
  ];
  for(const ep of endpoints){
    try{
      const r=await fetch(ep);
      const d=await r.json();
      lastResp=d; found=extractUrl(d);
      if(found) break;
    }catch(e){}
  }
  if(!found){
    try{
      const r=await fetch(`${API}/download/${bookId}`);
      const d=await r.json();
      const arr=normalizeList(d);
      const match=arr[idx]||arr.find(c=>String(c.chapter_id||c.chapterId||c.id)===String(chapterId));
      if(match){ found=extractUrl(match); lastResp=match; }
      if(arr.length) currentChapters=arr;
    }catch(e){}
  }
  playStream(found, found?null:lastResp);
}

function closePlayer(){
  document.getElementById('playerModal').classList.remove('open');
  resetVideo();
}

// ── WATCHLIST PAGE ──
function goWatchlist(){
  showPage('watchlistPage'); setBottomNav('bnav-wl');
  const empty=document.getElementById('wlEmpty');
  if(!watchlist.length){ document.getElementById('wlGrid').innerHTML=''; empty.style.display=''; }
  else { empty.style.display='none'; document.getElementById('wlGrid').innerHTML=watchlist.map(renderGridCard).join(''); }

// ── NAVIGATION ──
function showPage(id){
  ['mainPage','searchPage','watchlistPage','categoryPage'].forEach(p=>{
    document.getElementById(p).style.display=p===id?'':'none';
  });
}
function setBottomNav(active){
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(active)?.classList.add('active');
}
function goHome(){
  showPage('mainPage'); setBottomNav('bnav-home');

}

// Close modals
document.getElementById('detailModal').addEventListener('click',e=>{ if(e.target===document.getElementById('detailModal')) closeDetail(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeDetail(); closePlayer(); } });

// INIT
updateWLCount();
loadHome();
